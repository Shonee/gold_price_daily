name: Deploy Gold Price Page

on:
  # 手动触发
  workflow_dispatch:
  # 每日定时（UTC 01:00 ≈ 北京时间 09:00）
  schedule:
    - cron: "0 1 * * *"
  # 相关文件变更时触发（排除脚本自动生成的文件，避免循环触发）
  push:
    branches: [main, master]
    paths:
      - "generate_gold_page.py"
      - "html/template.html"
      - ".github/workflows/main.yml"

# GitHub Pages 部署及代码提交所需权限
permissions:
  contents: write
  pages: write
  id-token: write

# 避免并发部署互相取消，但允许排队
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate gold price page
        run: python ./generate_gold_page.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add html/index.html html/gold_data.json README.md
          git diff --staged --quiet || git commit -m "chore: update gold price data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # 如果仓库尚未开启 Pages，自动启用（需要 pages: write 权限）
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 发布 html/ 目录（index.html 为入口）
          path: html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
